body {

.border:hover {

a {

/* navbar 
--------------------------------------- */
.navbar {
  display: flex;
  flex-direction: row;
  justify-content: space-around;
  align-items: center;
  border: border-box;
  background-color: #4DB6AC;
  color: black;
  width: 100%;
  height: 40px;
}
.navbar a{
  text-transform: capitalize;
  text-decoration: none;
  color: black;
  border: border-box;
}

/* profile-box
---------------------------------------*/
.profile-box{
  display: flex;
  border: border-box;
  height: 100px;
  width: 100%;
  color: black;
  background-color: #80CBC4;
  border-bottom: 3px solid #4DB6AC;
  border-bottom-left-radius: 18px;
  border-bottom-right-radius: 18px;
}
.logo-frame{
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100px;
  height: 100px;
}
.logo{
  height: 75px;
  width: 75px;
  padding: 25px;
}
.profile-name {
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding: 18px;
  width: 100%;
  }
/* item-type-selector-box
--------------------------------------- */
.secondPanel {
  background-size: cover;
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  height: 300px;
}
.item-type-select {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
  height: 100%;
}
#myNavigation {
  border: 3px solid #4DB6AC;
  border-radius: 6px;
  height: 2.5rem;
  width: 60vw;
  background-color: #B2DFDB;
  box-shadow: 0 4px 10px rgba(0,0,0,0.6);
}

.header2 {
  background-color: #E0F2F1;
  color: #4DB6AC;
  border-bottom: 2px solid ;
  border-top: 2px solid;
  border-radius: 15px;
  line-height: 50px;
  width: 50%;
  text-align: center;
  margin: 30px 25% 30px 25%;
}

  /* मुख्य कार्ड
 */.favourite-items {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
  gap: 20px;
  padding: 20px;
}

.card {
  display: flex;
  flex-direction: column;
  background: #E0F2F1;
  overflow: hidden;
  border-radius: 12px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  width: 100%;
  max-width: ;
  border: 3px solid #B2DFDB;
}

/* image-container
--------------------------------------- */
.image-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-around;
  align-items: center;
}

  /* इमेज फ्रेम */
  .image-frame {
    width: 160px;
    height: 160px;
    flex-shrink: 0;
  }

  /* इमेज पर लिंक की सेटिंग */
  .image-link {
    display: block;
    width: 100%;
    height: 100%;
  }

  .image-link img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* रेश्यो सही रखेगा */
    display: block;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  /* जानकारी वाला हिस्सा */
  
  .item-types h2 {
    margin: 18px 20px 7px 25px;
    font-size: 1.1rem;
    color: #4DB6AC;
    text-transform: capitalize;
  }
  .see-more {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 5px 14px 10px 0;
    text-transform: lowercase;
  }

  /* footer
  --------------------------------------- */
.footer {
  background-color: #4DB6AC;
  color: black;
  position: static;
  bottom: 0px;
  width: 100vw;
  display: flex;
  justify-content: center;
  padding-bottom: 12px;
}
.footer p {
  padding-top: 1%;
  text-align: center;
